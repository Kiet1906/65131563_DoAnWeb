<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - PhoneStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card p-4 bg-white">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary"><i class="bi bi-box-arrow-in-right"></i> ĐĂNG NHẬP</h2>
                    <p class="text-muted small">Vui lòng đăng nhập để tiếp tục mua sắm</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger py-2 text-center fw-semibold small shadow-sm">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i> Tài khoản hoặc mật khẩu không đúng!
                </div>
                <div th:if="${param.logout}" class="alert alert-success py-2 text-center fw-semibold small shadow-sm">
                    <i class="bi bi-check-circle-fill me-1"></i> Bạn đã đăng xuất thành công!
                </div>
                <div th:if="${message}" class="alert alert-success py-2 text-center fw-semibold small shadow-sm">
                    <i class="bi bi-check-circle-fill me-1"></i> <span th:text="${message}"></span>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Nhập tài khoản..." required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu..." required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm mb-3">ĐĂNG NHẬP</button>
                    
                    <div class="text-center mb-3">
                        <span class="text-muted small">Chưa có tài khoản?</span>
                        <a th:href="@{/register}" class="text-decoration-none small fw-bold">Đăng ký ngay</a>
                    </div>

                    <div class="text-center border-top pt-3">
                        <a th:href="@{/}" class="text-decoration-none text-secondary fw-semibold">
                            <i class="bi bi-house-door-fill text-primary"></i> Quay lại trang chủ
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
