<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập Hệ Thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-lg mt-5">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="mb-0">ĐĂNG NHẬP HỆ THỐNG</h4>
                </div>
                <div class="card-body p-4">
                    
                    <div th:if="${param.error}" class="alert alert-danger text-center py-2">
                        Tài khoản hoặc mật khẩu không đúng!
                    </div>
                    
                    <div th:if="${param.logout}" class="alert alert-success text-center py-2">
                        Bạn đã đăng xuất thành công.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label font-weight-bold">Tên đăng nhập:</label>
                            <input type="text" name="username" class="form-control" placeholder="Nhập tài khoản" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu:</label>
                            <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required/>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-2 mt-2">Đăng Nhập</button>
                    </form>
                </div>
                <div class="card-footer text-center bg-white py-3">
                    <a th:href="@{/}" class="text-muted text-decoration-none">← Quay lại trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
