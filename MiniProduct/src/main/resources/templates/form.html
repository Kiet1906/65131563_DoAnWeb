<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập Nhật Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3>Thông Tin Sản Phẩm</h3>
                </div>
                <div class="card-body">
                    <form action="#" th:action="@{/save}" th:object="${product}" method="post">
                        
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label">Tên Sản Phẩm:</label>
                            <input type="text" th:field="*{name}" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giá (VNĐ):</label>
                            <input type="number" th:field="*{price}" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số Lượng:</label>
                            <input type="number" th:field="*{quantity}" class="form-control" required />
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">Lưu Sản Phẩm</button>
                            <a th:href="@{/}" class="btn btn-secondary">Hủy Bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
