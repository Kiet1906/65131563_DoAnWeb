<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập Nhật Sản Phẩm - PhoneStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        html, body {
            background-color: #e2e8f0 !important; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .modern-card {
            background-color: #ffffff !important;
            border: 2px solid #94a3b8 !important; 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .card-header-custom {
            background-color: #0d6efd !important;
            color: #ffffff !important;
            border-bottom: 2px solid #94a3b8 !important;
        }
        .form-control, .form-select {
            border: 2px solid #94a3b8 !important; 
            border-radius: 6px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #0d6efd !important;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .form-label {
            font-weight: 600;
            color: #334155;
        }
    </style>
</head>
<body class="py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card modern-card bg-white shadow">
                
                <div class="card-header card-header-custom text-center py-3">
                    <h3 class="m-0 fw-bold">
                        <i class="bi bi-phone-flip me-2"></i>
                        <span th:text="${product.id == null} ? 'THÊM ĐIỆN THOẠI MỚI' : 'CẬP NHẬT THÔNG TIN ĐIỆN THOẠI'">CẬP NHẬT</span>
                    </h3>
                </div>

                <div class="card-body p-4 bg-white">
                    <form th:action="@{/save}" th:object="${product}" method="post" enctype="multipart/form-data">
                        
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label">Tên Điện Thoại:</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Ví dụ: iPhone 15 Pro Max, Samsung S24 Ultra..." required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-primary"><i class="bi bi-tag-fill me-1"></i> Hãng Sản Xuất (Danh mục):</label>
                            <select th:field="*{category}" class="form-select" required>
                                <option value="">-- Chọn hãng sản xuất thích hợp --</option>
                                <option th:each="cat : ${listCategories}" 
                                        th:value="${cat.id}" 
                                        th:text="${cat.name}">Tên Hãng</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giá Bán (VNĐ):</label>
                            <input type="number" th:field="*{price}" class="form-control" placeholder="Nhập giá tiền bán lẻ..." required min="0" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số Lượng Kho:</label>
                            <input type="number" th:field="*{quantity}" class="form-control" placeholder="Nhập số lượng máy nhập kho..." required min="0" />
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-primary"><i class="bi bi-image me-1"></i> Ảnh Sản Phẩm (Tùy chọn):</label>
                            <input type="file" name="imageFile" accept="image/png, image/jpeg, image/webp" class="form-control" />
                            <div th:if="*{image != null && image != ''}" class="mt-2 small text-muted">
                                <i class="bi bi-paperclip"></i> Ảnh hiện tại: <span class="fw-semibold text-dark" th:text="*{image}">image.jpg</span>
                            </div>
                        </div>

                        <div class="text-center pt-2 border-top">
                            <button type="submit" class="btn btn-primary px-4 fw-bold me-2 shadow-sm">
                                <i class="bi bi-save-fill me-1"></i> Lưu Sản Phẩm
                            </button>
                            <a th:href="@{/}" class="btn btn-secondary px-4 fw-bold shadow-sm">
                                <i class="bi bi-x-circle-fill me-1"></i> Hủy Bỏ
                            </a>
                        </div>
                    </form>
                </div>
                
            </div>
        </div>
    </div>
</div>
</body>
</html>
