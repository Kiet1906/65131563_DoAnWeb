<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table-custom th, .table-custom td {
            border: 1px solid #dee2e6 !important;
        }
        .table-custom thead th {
            border-bottom: 2px solid #495057 !important;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛒 MiniProduct Pro</a>
        
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-brand navbar-nav align-items-center">
                
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline-light btn-sm px-3">Đăng Nhập</a>
                </li>
                
                <li class="nav-item me-3 text-white-50 small" sec:authorize="isAuthenticated()">
                    <span>Xin chào, <strong class="text-white" sec:authentication="name">User</strong>! </span>
                    <span class="badge bg-secondary ms-1" sec:authentication="principal.authorities">[ROLE]</span>
                </li>
                
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm px-3">Đăng Xuất</button>
                    </form>
                </li>
                
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div class="card shadow p-4 bg-white rounded">
        <h2 class="text-center text-primary mb-4 fw-bold">HỆ THỐNG QUẢN LÝ SẢN PHẨM</h2>
        
        <div class="mb-3 text-start">
            <a th:href="@{/new}" class="btn btn-success fw-bold shadow-sm"> + Thêm Sản Phẩm Mới</a>
        </div>

        <table class="table table-custom table-striped table-hover align-middle shadow-sm">
            <thead class="table-dark text-center">
                <tr>
                    <th style="width: 5%">STT</th>
                    <th style="width: 15%">Hình Ảnh</th>
                    <th>Tên Sản Phẩm</th>
                    <th style="width: 20%">Giá (VNĐ)</th>
                    <th style="width: 12%">Số Lượng</th>
                    <th style="width: 15%">Hành Động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(listProducts)}">
                    <td colspan="6" class="text-center text-muted py-4">Chưa có sản phẩm nào trong hệ thống. Hãy thêm mới!</td>
                </tr>
                
                <tr th:each="product, status : ${listProducts}">
                    <td class="text-center fw-bold" th:text="${(currentPage - 1) * 5 + status.count}">1</td>
                    
                    <td class="text-center">
                        <img th:if="${product.image != null}" th:src="@{'/product-images/' + ${product.image}}" width="80" height="80" style="object-fit: cover;" class="img-thumbnail shadow-sm" alt="Ảnh SP" />
                        <span th:if="${product.image == null}" class="text-muted small"><i>Chưa có ảnh</i></span>
                    </td>
                    
                    <td class="ps-3 fw-semibold" th:text="${product.name}">Tên SP</td>
                    <td class="text-end pe-4 text-danger fw-bold" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">1,000 đ</td>
                    <td class="text-center" th:text="${product.quantity}">10</td>
                    <td class="text-center">
                        <a th:href="@{'/edit/' + ${product.id}}" class="btn btn-warning btn-sm fw-medium shadow-sm me-1">Sửa</a>
                        <a th:href="@{'/delete/' + ${product.id}}" class="btn btn-danger btn-sm fw-medium shadow-sm" 
                           onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này không?');">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-3">
            <div class="text-muted small">
                Tổng cộng: <strong th:text="${totalItems}">0</strong> sản phẩm
            </div>
            
            <nav aria-label="Page navigation">
                <ul class="pagination pagination-sm mb-0">
                    
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{'/page/' + ${currentPage - 1}}">Trước</a>
                    </li>
                    
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                        <a class="page-link" th:href="@{'/page/' + ${i}}" th:text="${i}">1</a>
                    </li>
                    
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{'/page/' + ${currentPage + 1}}">Sau</a>
                    </li>
                    
                </ul>
            </nav>
        </div>

    </div>
</div>

</body>
</html>
