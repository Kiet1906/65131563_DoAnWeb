<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center text-primary mb-4">HỆ THỐNG QUẢN LÝ SẢN PHẨM</h2>
    
    <a th:href="@{/new}" class="btn btn-success mb-3"> + Thêm Sản Phẩm Mới</a>

    <table class="table table-bordered table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên Sản Phẩm</th>
                <th>Giá (VNĐ)</th>
                <th>Số Lượng</th>
                <th>Hành Động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${listProducts}">
                <td th:text="${product.id}">1</td>
                <td th:text="${product.name}">Tên SP</td>
                <td th:text="${product.price}">1000</td>
                <td th:text="${product.quantity}">10</td>
                <td>
                    <a th:href="@{'/edit/' + ${product.id}}" class="btn btn-warning btn-sm">Sửa</a>
                    <a th:href="@{'/delete/' + ${product.id}}" class="btn btn-danger btn-sm" 
                       onclick="return confirm('Bạn có chắc chắn muốn xóa không?');">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
