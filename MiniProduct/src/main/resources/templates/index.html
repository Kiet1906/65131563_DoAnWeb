<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🛒 MiniProduct Pro</a>
        
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-brand navbar-nav align-items-center">
                
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline-light btn-sm px-3">Đăng Nhập</a>
                </li>
                
                <li class="nav-item me-3 text-white-50 small" sec:authorize="isAuthenticated()">
                    <span>Xin chào, <strong class="text-white" sec:authentication="name">User</strong>! </span>
                    <span class="badge bg-secondary ms-1" sec:authentication="principal.authorities">[ROLE]</span>
                </li>
                
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm px-3">Đăng Xuất</button>
                    </form>
                </li>
                
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow p-4 bg-white rounded">
        <h2 class="text-center text-primary mb-4 fw-bold">HỆ THỐNG QUẢN LÝ SẢN PHẨM</h2>
        
        <div class="mb-3 text-start">
            <a th:href="@{/new}" class="btn btn-success fw-bold shadow-sm"> + Thêm Sản Phẩm Mới</a>
        </div>

        <table class="table table-bordered table-striped table-hover align-middle shadow-sm">
            <thead class="table-dark text-center">
                <tr>
                    <th style="width: 8%">ID</th>
                    <th>Tên Sản Phẩm</th>
                    <th style="width: 20%">Giá (VNĐ)</th>
                    <th style="width: 15%">Số Lượng</th>
                    <th style="width: 18%">Hành Động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(listProducts)}">
                    <td colspan="5" class="text-center text-muted py-4">Chưa có sản phẩm nào trong hệ thống. Hãy thêm mới!</td>
                </tr>
                
                <tr th:each="product : ${listProducts}">
                    <td class="text-center fw-bold" th:text="${product.id}">1</td>
                    <td class="ps-3 fw-semibold" th:text="${product.name}">Tên SP</td>
                    <td class="text-end pe-4 text-danger fw-bold" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">1,000 đ</td>
                    <td class="text-center" th:text="${product.quantity}">10</td>
                    <td class="text-center">
                        <a th:href="@{'/edit/' + ${product.id}}" class="btn btn-warning btn-sm fw-medium shadow-sm me-1">Sửa</a>
                        <a th:href="@{'/delete/' + ${product.id}}" class="btn btn-danger btn-sm fw-medium shadow-sm" 
                           onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này không?');">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
