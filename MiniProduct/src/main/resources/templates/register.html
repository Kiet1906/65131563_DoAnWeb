<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Tài Khoản - PhoneStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card register-card p-4 bg-white">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary"><i class="bi bi-person-plus-fill"></i> ĐĂNG KÝ</h2>
                    <p class="text-muted small">Tạo tài khoản mới để mua sắm dễ dàng</p>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2 text-center fw-semibold small shadow-sm">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i> <span th:text="${error}"></span>
                </div>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" th:field="*{username}" class="form-control" placeholder="Nhập tài khoản (từ 3 ký tự)..." required minlength="3">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Nhập mật khẩu (từ 4 ký tự)..." required minlength="4">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm mb-3">ĐĂNG KÝ NGAY</button>
                    
                    <div class="text-center mb-3">
                        <span class="text-muted small">Đã có tài khoản?</span>
                        <a th:href="@{/login}" class="text-decoration-none small fw-bold">Đăng nhập</a>
                    </div>

                    <div class="text-center border-top pt-3">
                        <a th:href="@{/}" class="text-decoration-none text-secondary fw-semibold">
                            <i class="bi bi-house-door-fill text-primary"></i> Quay lại trang chủ
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
